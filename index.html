<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ashim | AI & Full Stack Developer</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        /* CSS Variables for Gradients and Colors */
        :root {
            --bg-color: #030014;
            --text-main: #ffffff;
            --text-muted: #9ca3af;
            --primary-blue: #3b82f6;
            --primary-purple: #a855f7;
            --gradient-text: linear-gradient(90deg, #3b82f6, #a855f7);
            --gradient-btn: linear-gradient(90deg, #4f46e5, #9333ea);
            --glow-purple: rgba(168, 85, 247, 0.5);
            --glow-blue: rgba(59, 130, 246, 0.5);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Poppins', sans-serif;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            overflow-x: hidden;
            position: relative;
        }

        /* Canvas for Particle Background */
        #particle-canvas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1;
        }

        /* Navbar */
        nav {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 2rem 5%;
            position: relative;
            z-index: 10;
        }

        .logo {
            font-size: 1.5rem;
            font-weight: 700;
            letter-spacing: 2px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .logo span {
            color: var(--primary-purple);
            font-weight: 800;
        }

        .nav-links {
            display: flex;
            gap: 2.5rem;
            list-style: none;
        }

        .nav-links li a {
            color: var(--text-main);
            text-decoration: none;
            font-size: 0.9rem;
            transition: color 0.3s;
            position: relative;
        }

        .nav-links li a:hover {
            color: var(--primary-purple);
        }

        .nav-links li a.active {
            color: var(--primary-blue);
        }
        
        .nav-links li a.active::after {
            content: '';
            position: absolute;
            bottom: -8px;
            left: 50%;
            transform: translateX(-50%);
            width: 6px;
            height: 6px;
            background-color: var(--primary-purple);
            border-radius: 50%;
            box-shadow: 0 0 10px var(--primary-purple);
        }

        .resume-btn {
            background: transparent;
            border: 1px solid rgba(255, 255, 255, 0.2);
            color: white;
            padding: 0.6rem 1.5rem;
            border-radius: 8px;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 8px;
            transition: all 0.3s;
        }

        .resume-btn:hover {
            border-color: var(--primary-purple);
            box-shadow: 0 0 15px var(--glow-purple);
        }

        /* Hero Section */
        .hero {
            display: flex;
            align-items: center;
            justify-content: space-between;
            min-height: calc(100vh - 100px);
            padding: 0 5%;
            position: relative;
            z-index: 10;
        }

        .hero-content {
            flex: 1;
            max-width: 600px;
        }

        .welcome-badge {
            display: inline-flex;
            align-items: center;
            gap: 10px;
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.1);
            padding: 8px 16px;
            border-radius: 20px;
            font-size: 0.8rem;
            letter-spacing: 2px;
            margin-bottom: 2rem;
        }

        .dot {
            width: 8px;
            height: 8px;
            background-color: var(--primary-purple);
            border-radius: 50%;
            box-shadow: 0 0 10px var(--primary-purple);
        }

        h1 {
            font-size: 4.5rem;
            font-weight: 700;
            line-height: 1.2;
            margin-bottom: 1rem;
        }

        .gradient-text {
            background: var(--gradient-text);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        h2 {
            font-size: 2rem;
            color: var(--text-muted);
            font-weight: 500;
            margin-bottom: 1.5rem;
        }

        .description {
            color: var(--text-muted);
            font-size: 1.1rem;
            line-height: 1.6;
            margin-bottom: 2.5rem;
            max-width: 90%;
        }

        .action-buttons {
            display: flex;
            gap: 1.5rem;
            margin-bottom: 3rem;
        }

        .btn {
            padding: 12px 28px;
            border-radius: 8px;
            font-size: 1rem;
            font-weight: 500;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 10px;
            transition: all 0.3s ease;
            text-decoration: none;
            color: white;
        }

        .btn-primary {
            background: var(--gradient-btn);
            border: none;
            box-shadow: 0 4px 15px rgba(79, 70, 229, 0.4);
        }

        .btn-primary:hover {
            box-shadow: 0 6px 25px rgba(147, 51, 234, 0.6);
            transform: translateY(-2px);
        }

        .btn-secondary {
            background: transparent;
            border: 1px solid rgba(255, 255, 255, 0.2);
        }

        .btn-secondary:hover {
            border-color: var(--primary-blue);
            box-shadow: 0 0 15px var(--glow-blue);
            transform: translateY(-2px);
        }

        /* Social Links */
        .social-section {
            margin-top: 2rem;
        }

        .social-section p {
            font-size: 0.8rem;
            letter-spacing: 2px;
            color: var(--text-muted);
            margin-bottom: 1rem;
        }

        .social-icons {
            display: flex;
            gap: 1rem;
        }

        .social-icons a {
            display: flex;
            align-items: center;
            justify-content: center;
            width: 40px;
            height: 40px;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 8px;
            color: white;
            text-decoration: none;
            transition: all 0.3s;
        }

        .social-icons a:hover {
            background: rgba(255, 255, 255, 0.1);
            border-color: var(--primary-purple);
            color: var(--primary-purple);
            transform: translateY(-3px);
        }

        /* Hero Right Side (Visuals) */
        .hero-visuals {
            flex: 1;
            display: flex;
            justify-content: center;
            align-items: center;
            position: relative;
            height: 600px;
        }

        .neon-circle {
            position: absolute;
            width: 450px;
            height: 450px;
            border-radius: 50%;
            border: 2px solid transparent;
            background: linear-gradient(var(--bg-color), var(--bg-color)) padding-box, 
                        linear-gradient(135deg, var(--primary-blue), var(--primary-purple)) border-box;
            box-shadow: 0 0 50px var(--glow-blue), inset 0 0 30px var(--glow-purple);
            animation: pulseGlow 4s infinite alternate;
        }

        @keyframes pulseGlow {
            0% { box-shadow: 0 0 30px var(--glow-blue), inset 0 0 20px var(--glow-purple); }
            100% { box-shadow: 0 0 60px var(--glow-purple), inset 0 0 40px var(--glow-blue); }
        }

        .profile-img {
            position: relative;
            z-index: 2;
            height: 110%;
            bottom: -5%;
            filter: drop-shadow(0 0 20px rgba(0,0,0,0.5));
            /* Placeholder for the user's specific illustration */
            content: url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" width="400" height="500" viewBox="0 0 400 500"><rect fill="transparent" width="400" height="500"/><text x="50%" y="50%" fill="%239ca3af" font-family="sans-serif" font-size="16" text-anchor="middle">Replace with your transparent PNG</text></svg>'); 
        }

        .floating-cube {
            position: absolute;
            width: 40px;
            height: 40px;
            border: 1px solid rgba(255,255,255,0.2);
            transform: rotate(45deg);
            animation: float 6s infinite ease-in-out;
        }

        .cube-1 { top: 10%; left: 10%; animation-delay: 0s; }
        .cube-2 { bottom: 20%; right: 10%; animation-delay: 2s; }
        .cube-3 { top: 40%; right: -5%; animation-delay: 4s; width: 25px; height: 25px; }

        @keyframes float {
            0%, 100% { transform: translateY(0) rotate(45deg); }
            50% { transform: translateY(-20px) rotate(60deg); }
        }

        /* Scroll Down Indicator */
        .scroll-down {
            position: absolute;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 10px;
            color: var(--text-muted);
            font-size: 0.8rem;
            letter-spacing: 2px;
            z-index: 10;
        }

        .mouse-icon {
            width: 24px;
            height: 36px;
            border: 2px solid var(--text-muted);
            border-radius: 12px;
            position: relative;
            display: flex;
            justify-content: center;
        }

        .mouse-wheel {
            width: 4px;
            height: 8px;
            background-color: var(--primary-purple);
            border-radius: 2px;
            margin-top: 6px;
            animation: scrollWheel 2s infinite;
        }

        @keyframes scrollWheel {
            0% { transform: translateY(0); opacity: 1; }
            100% { transform: translateY(15px); opacity: 0; }
        }

        /* Bottom Curved Line */
        .bottom-glow {
            position: absolute;
            bottom: 0;
            left: 0;
            width: 100%;
            height: 2px;
            background: linear-gradient(90deg, transparent, var(--primary-blue), var(--primary-purple), transparent);
            box-shadow: 0 0 20px var(--primary-purple);
        }

        /* Mobile Menu Toggle */
        .mobile-menu-btn {
            display: none;
            color: white;
            font-size: 1.5rem;
            cursor: pointer;
            background: none;
            border: none;
        }

        /* Responsive Design */
        @media (max-width: 1024px) {
            h1 { font-size: 3.5rem; }
            h2 { font-size: 1.5rem; }
            .neon-circle { width: 350px; height: 350px; }
        }
      
 @media (max-width: 768px) {
            nav { padding: 1.5rem 5%; }
            .nav-links {
                display: none; /* Hide for mobile by default */
                flex-direction: column;
                position: absolute;
                top: 80px;
                left: 0;
                width: 100%;
                background: rgba(3, 0, 20, 0.95);
                backdrop-filter: blur(10px);
                padding: 2rem 0;
                text-align: center;
                border-bottom: 1px solid rgba(255,255,255,0.1);
            }
            .nav-links.active {
                display: flex;
            }
            .mobile-menu-btn { display: block; }
            .resume-btn { display: none; } /* Move to menu if needed */

            .hero {
                flex-direction: column;
                text-align: center;
                padding-top: 2rem;
            }
            
            .hero-content {
                display: flex;
                flex-direction: column;
                align-items: center;
            }

            .description { margin-bottom: 2rem; }
            
            .action-buttons {
                flex-direction: column;
                width: 100%;
                max-width: 300px;
            }
            
            .social-section {
                display: flex;
                flex-direction: column;
                align-items: center;
            }

            .hero-visuals {
                margin-top: 4rem;
                height: 400px;
                width: 100%;
            }
            
            .neon-circle { width: 300px; height: 300px; }
            .profile-img { height: 100%; }
        }
    </style>
</head>
<body>

    <canvas id="particle-canvas"></canvas>

    <nav>
        <div class="logo">
            <span style="font-style: italic;">A</span>\ ASHIM
        </div>
        <ul class="nav-links" id="navLinks">
            <li><a href="#home" class="active">Home</a></li>
            <li><a href="#about">About</a></li>
            <li><a href="#projects">Projects</a></li>
            <li><a href="#skills">Skills</a></li>
            <li><a href="#contact">Contact</a></li>
        </ul>
        <button class="resume-btn">
            Resume <i class="fa-solid fa-download"></i>
        </button>
        <button class="mobile-menu-btn" id="menuBtn">
            <i class="fa-solid fa-bars"></i>
        </button>
    </nav>

    <main class="hero" id="home">
        <div class="hero-content">
            <div class="welcome-badge">
                <div class="dot"></div> WELCOME TO MY PORTFOLIO
            </div>
            
            <h1>Hi, I'm <span class="gradient-text">Ashim</span></h1>
            <h2>AI Developer & Full Stack Developer</h2>
            
            <p class="description">
                I build intelligent, responsive and high-performance web applications with modern technologies.
            </p>

            <div class="action-buttons">
                <a href="#projects" class="btn btn-primary">
                    View Projects <i class="fa-solid fa-arrow-right"></i>
                </a>
                <a href="#contact" class="btn btn-secondary">
                    Contact Me <i class="fa-solid fa-arrow-right"></i>
                </a>
            </div>

            <div class="social-section">
                <p>FIND ME ON</p>
                <div class="social-icons">
                    <a href="#"><i class="fa-brands fa-github"></i></a>
                    <a href="#"><i class="fa-brands fa-linkedin-in"></i></a>
                    <a href="#"><i class="fa-brands fa-twitter"></i></a>
                    <a href="#"><i class="fa-brands fa-instagram"></i></a>
                </div>
            </div>
        </div>

        <div class="hero-visuals">
            <div class="neon-circle"></div>
            <div class="floating-cube cube-1"></div>
            <div class="floating-cube cube-2"></div>
            <div class="floating-cube cube-3"></div>
            
            <img class="profile-img" src="" alt="Ashim Silhouette">
        </div>
    </main>

    <div class="scroll-down">
        SCROLL DOWN
        <div class="mouse-icon">
            <div class="mouse-wheel"></div>
        </div>
        <i class="fa-solid fa-chevron-down" style="color: var(--primary-purple); animation: scrollWheel 2s infinite; animation-delay: 0.5s;"></i>
    </div>

    <div class="bottom-glow"></div>

    <script>
        // Mobile Menu Toggle
        const menuBtn = document.getElementById('menuBtn');
        const navLinks = document.getElementById('navLinks');

        menuBtn.addEventListener('click', () => {
            navLinks.classList.toggle('active');
            const icon = menuBtn.querySelector('i');
            if(navLinks.classList.contains('active')) {
                icon.classList.remove('fa-bars');
                icon.classList.add('fa-xmark');
            } else {
                icon.classList.remove('fa-xmark');
                icon.classList.add('fa-bars');
            }
        });

        // Particle Background System
        const canvas = document.getElementById('particle-canvas');
        const ctx = canvas.getContext('2d');
        
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;

        let particlesArray = [];
        
        class Particle {
            constructor() {
                this.x = Math.random() * canvas.width;
                this.y = Math.random() * canvas.height;
                this.size = Math.random() * 2;
                this.speedX = Math.random() * 0.5 - 0.25;
                this.speedY = Math.random() * 0.5 - 0.25;
                // Mix of blue and purple stars
                this.color = Math.random() > 0.5 ? 'rgba(59, 130, 246, 0.5)' : 'rgba(168, 85, 247, 0.5)';
            }
            update() {
                this.x += this.speedX;
                this.y += this.speedY;
                
                if (this.x > canvas.width) this.x = 0;
                if (this.x < 0) this.x = canvas.width;
                if (this.y > canvas.height) this.y = 0;
                if (this.y < 0) this.y = canvas.height;
            }
            draw() {
                ctx.fillStyle = this.color;
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
                ctx.fill();
            }
        }

        function initParticles() {
            particlesArray = [];
            let numberOfParticles = (canvas.width * canvas.height) / 9000;
            for (let i = 0; i < numberOfParticles; i++) {
                particlesArray.push(new Particle());
            }
        }

        function animateParticles() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            for (let i = 0; i < particlesArray.length; i++) {
                particlesArray[i].update();
                particlesArray[i].draw();
            }
            requestAnimationFrame(animateParticles);
        }

        initParticles();
        animateParticles();

        // Handle Resize
        window.addEventListener('resize', () => {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
            initParticles();
        });
    </script>
</body>
</html>
